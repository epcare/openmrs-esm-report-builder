name: ePCare CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types:
      - created

concurrency:
  group: epcare-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.10.3 --activate

      - name: Configure Yarn linker
        run: yarn config set nodeLinker node-modules

      - name: Install dependencies
        run: yarn install --immutable

      - name: Verify
        run: yarn verify

      - name: Build
        run: yarn build

      - name: Verify source routes file
        run: |
          test -f src/routes.json || (echo "src/routes.json missing" && exit 1)

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          if-no-files-found: error

  pre_release:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'push' }}

    steps:
      - uses: actions/checkout@v6

      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.10.3 --activate

      - name: Configure Yarn linker
        run: yarn config set nodeLinker node-modules

      - name: Install dependencies
        run: yarn install --immutable

      - name: Version
        run: yarn version --no-git-tag-version --new-version "$(node -e "console.log(require('semver').inc(require('./package.json').version, 'patch'))")-pre.${{ github.run_number }}"

      - name: Build
        run: yarn build

      - name: Verify source routes file
        run: |
          test -f src/routes.json || (echo "src/routes.json missing" && exit 1)

      - name: Prepare root routes.json
        run: |
          cp src/routes.json routes.json
          test -f routes.json || (echo "root routes.json missing" && exit 1)

      - name: Verify npm package contents
        run: |
          yarn pack --out package.tgz
          tar -tf package.tgz | grep -E '^package/routes.json$' || (echo "root routes.json missing from tarball" && exit 1)

      - name: Commit prerelease version
        run: |
          git config user.email "info@openmrs.org"
          git config user.name "OpenMRS CI"
          git add package.json
          git commit -m "Prerelease version" --no-verify

      - name: Pre-release
        run: |
          yarn config set npmAuthToken "${NODE_AUTH_TOKEN}"
          yarn npm publish --access public --tag next
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

      - name: Clean root routes.json
        if: always()
        run: rm -f routes.json package.tgz

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          overwrite: true

  release:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'release' }}

    steps:
      - uses: actions/checkout@v6

      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.10.3 --activate

      - name: Configure Yarn linker
        run: yarn config set nodeLinker node-modules

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Verify source routes file
        run: |
          test -f src/routes.json || (echo "src/routes.json missing" && exit 1)

      - name: Prepare root routes.json
        run: |
          cp src/routes.json routes.json
          test -f routes.json || (echo "root routes.json missing" && exit 1)

      - name: Verify npm package contents
        run: |
          yarn pack --out package.tgz
          tar -tf package.tgz | grep -E '^package/routes.json$' || (echo "root routes.json missing from tarball" && exit 1)

      - name: Publish
        run: |
          yarn config set npmAuthToken "${NODE_AUTH_TOKEN}"
          yarn npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

      - name: Clean root routes.json
        if: always()
        run: rm -f routes.json package.tgz